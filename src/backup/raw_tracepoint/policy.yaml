api_version: policy.yamong.com/v1
name: multi-container-example-policy

containers:
  - container_name: sleep_con_1
    raw_tp_policy: true
    tracepoint_policy:
      tracepoints:
      - __NR_umount2
    lsm_policies:
      file:
        - path: "/etc/passwd"
          flags:
            - POLICY_ALLOW
            - POLICY_AUDIT
            - POLICY_FILE_READ
          uid: 
            - 1000
            - 1001
        - path: "/var/log"
          flags:
            - POLICY_ALLOW
            - POLICY_AUDIT
            - POLICY_FILE_WRITE
            - POLICY_FILE_APPEND
            - POLICY_RECURSIVE
          uid: 
            - 1000
            - 1001   
        - path: "/sys"
          flags:
            - POLICY_ALLOW
            - POLICY_AUDIT
            - POLICY_FILE_WRITE
            - POLICY_FILE_APPEND
            - POLICY_RECURSIVE
          uid: 
            - 1000
            - 1001   
      network:
        - ip: "192.168.1.100"
          port: 80
          protocol: 6  # TCP
          flags:
            - POLICY_ALLOW
            - POLICY_AUDIT
            - POLICY_NET_CONNECT
          uid: 
            - 1000
            - 1001   
        - ip: "10.0.0.0/8"
          port: 443
          protocol: 6  # TCP
          flags:
            - POLICY_NET_CONNECT
            - POLICY_DENY
          uid: 
            - 1000
            - 1001   
      process:
        - comm: "nginx"
          flags:
            - POLICY_ALLOW
            - POLICY_AUDIT
            - POLICY_PROC_EXEC
          uid: 
            - 1000
            - 1001   
        - comm: "bash"
          flags:
            - POLICY_ALLOW
            - POLICY_AUDIT
            - POLICY_PROC_EXEC
          uid: 
            - 1000
            - 1001
