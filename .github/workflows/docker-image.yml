name: Docker Image CI

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Install submodule
        run: git submodule update --init --recursive

      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Log in to GitHub Packages
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push the Docker image to GitHub Packages
        run: docker push ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Set Image Version
        id: image_version
        run: echo "::set-output name=version::${{ github.sha }}"

      - name: Create GitHub release
        uses: actions/create-release@v1
        if: startsWith(github.ref, 'refs/heads/main') # Only on pushes to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.image_version.outputs.version }}
          release_name: v${{ steps.image_version.outputs.version }}
          body: |
            Docker image release: `ghcr.io/${{ github.repository }}:${{ steps.image_version.outputs.version }}`
