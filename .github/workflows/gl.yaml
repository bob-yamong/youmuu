name: "CodeQL Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0' # Weekly run

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the repository
    - name: Checkout repository
      uses: actions/checkout@v3

    # Step 2: Set up build environment (install required tools)
    - name: Set up build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    # Step 3: Run the build process (make build and make install)
    - name: Build the project
      run: |
        make install
        make build

    # Step 4: Initialize CodeQL
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: 'cpp' # Specify the language(s) to analyze

    # Step 5: Perform CodeQL Analysis
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2
