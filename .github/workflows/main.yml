name: Validate Dockerfile

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t my-repo-image:pr-${{ github.event.number }} .

      - name: Run Docker container with tests
        run: docker run --rm my-repo-image:pr-${{ github.event.number }} /bin/sh -c "make test"
